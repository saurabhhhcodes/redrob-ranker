# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A heuristics-driven candidate discovery and ranking system. Features an automated multi-step honeypot scanner that filters out all 81 synthetic contradictions (e.g. single job exceeding total experience, skill duration conflicts, future certifications). Eligible candidates are scored using a linear combination of target experience alignment (5-9 years), title relevancy, and key skills weighting (vector databases, dense retrieval, and ranking evaluation metrics). Raw scores are adjusted using multiplicative behavioral signals like login recency, notice period, and recruiter response rates.

